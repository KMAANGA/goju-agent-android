name: Build Debug APK

# Manual "Run workflow" button (Actions tab) plus automatic runs on every push to main.
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # The Gradle wrapper jar isn't committed to this repo (it's a binary that needs a
      # local Gradle install to generate, which wasn't available when this project was
      # scaffolded — see docs/TESTING_GUIDE.md). This action installs Gradle directly
      # instead of relying on ./gradlew, and caches dependencies between runs.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      # Builds both flavors in one run: development points at
      # https://dev.gojucloud.maangatech.com/ (likely not deployed), production points at
      # the real https://gojucloud.maangatech.com/ — see app/build.gradle.kts.
      - name: Build debug APKs (development + production)
        run: gradle assembleDevelopmentDebug assembleProductionDebug --no-daemon --stacktrace

      - name: Upload development APK
        uses: actions/upload-artifact@v4
        with:
          name: goju-agent-development-debug
          path: app/build/outputs/apk/development/debug/*.apk
          if-no-files-found: error

      - name: Upload production APK
        uses: actions/upload-artifact@v4
        with:
          name: goju-agent-production-debug
          path: app/build/outputs/apk/production/debug/*.apk
          if-no-files-found: error

  unit-tests:
    runs-on: ubuntu-latest
    # Independent of the build job on purpose — a unit test failure shouldn't block getting
    # an APK to test on a device; it's just reported separately in the Actions run.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Run JVM unit tests
        run: gradle test --no-daemon --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: '**/build/reports/tests/'
          if-no-files-found: ignore
